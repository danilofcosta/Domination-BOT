version: "3.9"

services:

  postgres:
    image: docker.io/bitnami/postgresql:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/bitnami/postgresql


  redis:
    image: bitnami/redis:latest
    container_name: redis
    restart: unless-stopped
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/bitnami/redis/data


  waifu_bot:
    build: ./bot_telegram
    container_name: waifu_bot
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      TYPE_BOT: waifu
    depends_on:
      - postgres

  husbando_bot:
    build: ./bot_telegram
    container_name: husbando_bot
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      TYPE_BOT: husbando
    depends_on:
      - postgres

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    restart: unless-stopped
    ports:
      - "5000:3000"
    env_file:
      - stack.env
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:



